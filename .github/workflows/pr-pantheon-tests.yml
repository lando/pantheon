name: Pantheon Tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      lando-version:
        description: 'Lando version'
        required: true
        default: '3-edge'
        type: string

jobs:
  leia-tests:
    runs-on: ${{ matrix.os }}
    env:
      TERM: xterm
      PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        leia-test:
          - examples/drupal7
          - examples/drupal9
          - examples/drupal10
          - examples/drupal11
          - examples/init
          - examples/pantheon-downstreamer-1
          - examples/pantheon-downstreamer-2
          - examples/pantheon-drush-uri
          - examples/wordpress
          - examples/wordpressnetworkdomain
          # - examples/wordpressnetworkfolder
        lando-version:
          - 3-edge
          - 3-stable
        os:
          - ubuntu-24.04
        node-version:
          - '20'

    steps:
      # Install deps and cache
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install NPM dependencies
        run: npm clean-install --production --prefer-offline --frozen-lockfile
      - name: Bundle Deps
        uses: lando/prepare-release-action@v3
        with:
          lando-plugin: true
          version: dev
          sync: false
      - name: Setup lando ${{ matrix.lando-version }}
        uses: lando/setup-lando@v3
        with:
          lando-version: ${{ matrix.lando-version }}
          lando-version-file: ''
          config: |
            setup.skipCommonPlugins=true
            setup.plugins.@lando/pantheon=/home/runner/work/pantheon/pantheon
          telemetry: false
      - name: Stagger start to avoid Pantheon API burst
        shell: bash
        run: |
          # Deterministic per-cell delay. Separate windows per lando-version
          # keep the 3-stable variant from racing the 3-edge variant of the
          # same example on shared Pantheon SSH-key cleanup:
          #   3-stable -> 0-119s   (finishes well before edge starts)
          #   3-edge   -> 300-419s (starts after stable has torn down)
          KEY="${{ matrix.leia-test }}-${{ matrix.lando-version }}"
          HASH=$(echo -n "$KEY" | cksum | cut -d' ' -f1)
          if [ "${{ matrix.lando-version }}" = "3-stable" ]; then
            DELAY=$(( HASH % 120 ))
          else
            DELAY=$(( 300 + (HASH % 120) ))
          fi
          echo "Sleeping ${DELAY}s before starting (key: $KEY)"
          sleep "$DELAY"
      - name: Run Leia Tests
        uses: lando/run-leia-action@v2
        with:
          leia-test: "./${{ matrix.leia-test }}/README.md"
          cleanup-header: "Destroy tests"
          retry: 3
          shell: bash
          stdin: true
